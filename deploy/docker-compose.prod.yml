# Yanki — PROD stack. Driven by deploy/deploy.sh (project name: yanki-prod).
#   Same shape as dev, but: no bind-mounts/reload, restart: unless-stopped,
#   images tagged by git SHA. Serving topology (yanki.beyondkaira.com, on the
#   SAME VPS as the other beyondkaira sites — pulse-prod, Ant Media, brier —
#   which must never be disturbed):
#     - web + api join the shared Caddy's docker network (`pulse-prod_default`,
#       external) under the aliases yanki-web / yanki-api; the shared Caddy
#       terminates TLS and path-routes /api/* + /healthz -> yanki-api:8141,
#       else -> yanki-web:8140 (see deploy/caddy/yanki.beyondkaira.com.caddy).
#       A containerized Caddy cannot reach host-loopback binds, hence aliases.
#     - the 127.0.0.1 host binds below exist ONLY for deploy.sh health checks
#       and local debugging, and are parameterized because this VPS already
#       uses 8140: YANKI_PROD_WEB_PORT (default 8142) / YANKI_PROD_API_PORT
#       (default 8143) in deploy/.env.
# Requires POSTGRES_PASSWORD (and, when deploying, GIT_SHA) — see deploy/.env.
name: yanki-prod

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: yanki
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}
      POSTGRES_DB: yanki
    volumes:
      - yanki_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yanki -d yanki"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: yanki-api:${GIT_SHA:-latest}
    build:
      context: ../backend
    command: sh -c "alembic upgrade head && uvicorn app.api.main:app --host 0.0.0.0 --port 8141"
    ports:
      - "127.0.0.1:${YANKI_PROD_API_PORT:-8143}:8141"
    networks:
      default: {}
      caddy_shared:
        aliases: [yanki-api]
    environment:
      DATABASE_URL: postgresql+psycopg://yanki:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}@db:5432/yanki
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  worker:
    image: yanki-api:${GIT_SHA:-latest}
    build:
      context: ../backend
    command: python -m app.worker
    environment:
      DATABASE_URL: postgresql+psycopg://yanki:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}@db:5432/yanki
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started

  web:
    image: yanki-web:${GIT_SHA:-latest}
    build:
      context: ../frontend
      # Prod serves the optimized `next start` build, not `next dev` (the default
      # Dockerfile's CMD, used only by the hot-reload dev stack).
      dockerfile: Dockerfile.prod
    ports:
      - "127.0.0.1:${YANKI_PROD_WEB_PORT:-8142}:8140"
    networks:
      default: {}
      caddy_shared:
        aliases: [yanki-web]
    environment:
      API_ORIGIN: http://api:8141
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    depends_on:
      - api

volumes:
  yanki_pgdata:

networks:
  default: {}
  # The shared Caddy's network (created by the ams-pulse prod stack). Only web
  # and api join it (db + worker stay internal). If this external network is
  # missing, `compose up` fails fast — the pulse-prod stack must be up first.
  caddy_shared:
    external: true
    name: pulse-prod_default
