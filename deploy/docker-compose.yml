# Yanki — DEV stack. Brought up by `make dev`.
#   db + api + worker + web, with bind-mounts for hot reload.
# No CORS: the web container proxies /api/* + /healthz to the api (API_ORIGIN).
name: yanki

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: yanki
      POSTGRES_PASSWORD: yanki
      POSTGRES_DB: yanki
    ports:
      # Host port is parameterized to dodge conflicts; container port is fixed.
      - "${YANKI_DB_PORT:-5432}:5432"
    volumes:
      - yanki_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yanki -d yanki"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../backend
    command: sh -c "alembic upgrade head && uvicorn app.api.main:app --host 0.0.0.0 --port 8141 --reload"
    ports:
      - "${YANKI_API_PORT:-8141}:8141"
    environment:
      DATABASE_URL: postgresql+psycopg://yanki:yanki@db:5432/yanki
    env_file:
      - path: .env
        required: false
    volumes:
      # Bind the source for --reload; the image already installed the deps.
      - ../backend/app:/app/app
      - ../backend/alembic:/app/alembic
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ../backend
    command: python -m app.worker
    environment:
      DATABASE_URL: postgresql+psycopg://yanki:yanki@db:5432/yanki
    env_file:
      - path: .env
        required: false
    volumes:
      - ../backend/app:/app/app
      - ../backend/alembic:/app/alembic
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: ../frontend
    ports:
      - "${YANKI_WEB_PORT:-8140}:8140"
    environment:
      API_ORIGIN: http://api:8141
    env_file:
      - path: .env
        required: false
    volumes:
      - ../frontend:/app
      # Anonymous volumes keep the image's node_modules/.next, not the host's.
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  yanki_pgdata:
