name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: yanki
          POSTGRES_PASSWORD: yanki
          POSTGRES_DB: yanki_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U yanki -d yanki_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DRY_RUN: "1"
      TEST_DATABASE_URL: postgresql+psycopg://yanki:yanki@localhost:5433/yanki_test
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync deps
        working-directory: backend
        run: uv sync
      - name: Ruff
        working-directory: backend
        run: uv run ruff check .
      - name: Mypy
        working-directory: backend
        run: uv run mypy app
      - name: Pytest
        working-directory: backend
        run: uv run pytest

  frontend:
    name: frontend (typecheck + vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        working-directory: frontend
        run: npm ci || npm install
      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Test
        working-directory: frontend
        run: npm test -- --run
      - name: Build
        working-directory: frontend
        run: npm run build

  contract:
    name: contract drift gate (openapi + types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Backend deps
        working-directory: backend
        run: uv sync
      - name: Frontend deps
        working-directory: frontend
        run: npm ci || npm install
      - name: Regenerate contract
        run: |
          uv run --project backend python scripts/gen_openapi.py
          cd frontend && npm run gen-types
      - name: Fail on drift
        run: git diff --exit-code shared/contracts frontend/lib/types.ts
