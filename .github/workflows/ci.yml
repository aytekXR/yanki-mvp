name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: yanki
          POSTGRES_PASSWORD: yanki
          POSTGRES_DB: yanki_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U yanki -d yanki_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DRY_RUN: "1"
      TEST_DATABASE_URL: postgresql+psycopg://yanki:yanki@localhost:5433/yanki_test
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        # v7, not v8: the setup-uv v8 line dropped floating major tags (supply-
        # chain hardening), so @v8 does not resolve — v7 is the newest major
        # that keeps the repo's @vN pin style, and it already runs on node24.
        uses: astral-sh/setup-uv@v7
      - name: Sync deps
        working-directory: backend
        run: uv sync
      - name: Ruff
        working-directory: backend
        run: uv run ruff check .
      - name: Mypy
        working-directory: backend
        run: uv run mypy app
      - name: Pytest
        working-directory: backend
        run: uv run pytest

  frontend:
    name: frontend (typecheck + lint + vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install deps
        working-directory: frontend
        run: npm ci || npm install
      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Test
        working-directory: frontend
        run: npm test -- --run
      - name: Build
        working-directory: frontend
        run: npm run build

  contract:
    name: contract drift gate (openapi + types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        # v7, not v8: the setup-uv v8 line dropped floating major tags (supply-
        # chain hardening), so @v8 does not resolve — v7 is the newest major
        # that keeps the repo's @vN pin style, and it already runs on node24.
        uses: astral-sh/setup-uv@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Backend deps
        working-directory: backend
        run: uv sync
      - name: Frontend deps
        working-directory: frontend
        run: npm ci || npm install
      - name: Regenerate contract
        run: |
          uv run --project backend python scripts/gen_openapi.py
          uv run --project backend python scripts/gen_methodology.py
          cd frontend && npm run gen-types
      - name: Fail on drift
        run: git diff --exit-code shared/contracts frontend/lib/types.ts

  secrets:
    name: secret scan (gitleaks, full history)
    runs-on: ubuntu-latest
    env:
      # Pin gitleaks to an exact release + verify its checksum. Do NOT switch to
      # gitleaks/gitleaks-action: that action requires a GITLEAKS_LICENSE for
      # org repos. Running the release binary directly has no such gate.
      GITLEAKS_VERSION: "8.28.0"
      GITLEAKS_SHA256: "a65b5253807a68ac0cafa4414031fd740aeb55f54fb7e55f386acb52e6a840eb"
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the scan covers every commit, not just the tip.
          fetch-depth: 0
      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL -o gitleaks.tar.gz "$url"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks version
      - name: Scan full git history
        # `gitleaks git` scans every commit by default; --exit-code 1 fails the
        # job on any finding. --redact keeps a matched secret out of the logs.
        run: ./gitleaks git . --no-banner --redact --exit-code 1 -v

  e2e:
    name: e2e (playwright happy path, DRY_RUN stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      # Both installs MUST run before the stack boots: the compose web service
      # bind-mounts ../frontend with anonymous volumes at /app/node_modules and
      # /app/.next, and dockerd creates a missing host-side mountpoint dir as
      # root — a later npm ci then dies with EACCES (first CI run, 2026-07-10).
      # With node_modules already present and runner-owned, dockerd reuses it
      # and ownership is preserved. (.next stays root-owned; nothing host-side
      # touches it in this job — do not add a step that writes frontend/.next.)
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install
      - name: Install Playwright chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Pin the stack to DRY_RUN (mock providers, no keys)
        # deploy/.env is gitignored; the compose file reads it via env_file.
        # DRY_RUN=1 is already the backend default, but set it explicitly so the
        # e2e stack never depends on that default drifting.
        run: printf 'DRY_RUN=1\n' > deploy/.env
      - name: Boot the DRY_RUN stack
        run: docker compose -f deploy/docker-compose.yml up -d --build
      - name: Wait for API health
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8141/healthz >/dev/null 2>&1; then
              echo "api healthy after ${i} tries"; exit 0
            fi
            sleep 5
          done
          echo "api /healthz never came up"; exit 1
      - name: Wait for web
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8140/ >/dev/null 2>&1; then
              echo "web up after ${i} tries"; exit 0
            fi
            sleep 5
          done
          echo "web never came up"; exit 1
      - name: Run happy-path e2e
        working-directory: frontend
        env:
          # The spec skips itself unless E2E_BASE_URL is set; point it at the web
          # container so the run is real, not skipped.
          E2E_BASE_URL: http://localhost:8140
        # DRY_RUN mocks only the LLM providers; pipeline step 1 (discovery)
        # really fetches the submitted URL, so this needs runner egress to
        # example.com — treat a red here after green health waits as a
        # possible network flake before suspecting the app.
        run: npx playwright test e2e/happy-path.spec.ts
      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f deploy/docker-compose.yml logs
      - name: Tear down stack
        if: always()
        run: docker compose -f deploy/docker-compose.yml down -v
